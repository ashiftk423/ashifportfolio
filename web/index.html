<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Hint revalidation for the HTML shell (CDN/browser may still cache assets by URL/hash). -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ashifportfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ashifportfolio</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Unregister legacy Flutter service workers, then load bootstrap so no stale SW intercepts JS (mobile cache fix).
    GitHub Actions uses `flutter build web --pwa-strategy none` so new builds do not register a caching SW.
  -->
  <script>
    (async function () {
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function (r) { return r.unregister(); }));
        }
      } catch (_) {}
      var s = document.createElement("script");
      s.src = "flutter_bootstrap.js";
      s.async = true;
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
